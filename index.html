<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="theme-color" content="#4CAF50">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  window.db = db;
  window.docRef = doc(db, "gastos", "grupo");

  await cargarDesdeFirebase();
  render();

<style>
:root{--p:#4CAF50;--f:#f2f2f2;--t:#fff;--r:#e53935}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;background:var(--f);padding:12px;font-size:17px}
h1{text-align:center;font-size:26px}
h2{font-size:20px}
.card{background:var(--t);padding:15px;margin-bottom:15px;border-radius:14px;box-shadow:0 4px 10px rgba(0,0,0,.08)}
input,select{width:100%;padding:14px;margin:6px 0;border-radius:10px;border:1px solid #ccc;font-size:18px}
button{width:100%;padding:16px;border-radius:12px;border:none;background:var(--p);color:#fff;font-size:18px;font-weight:600;margin-top:8px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:8px;text-align:center}
th{background:#eee}
@media(min-width:600px){body{max-width:480px;margin:auto}}
</style>

</head>
<body>

<h1>💸 Gastos del Grupo</h1>

<div class="card" id="totalRestante"></div>

<div class="card" id="shareCard">
  <button onclick="compartirConDatos()">👥 Compartir vista del grupo</button>
</div>

<div id="modoLectura" class="card" style="display:none;background:#fff3cd">
👀 Vista solo lectura
</div>

<div class="card editable">
<h2>👤 Añadir persona</h2>
<input id="nombrePersona" placeholder="Nombre">
<input id="aportePersona" type="number" placeholder="Aportó €">
<button onclick="agregarPersona()">Añadir</button>
</div>

<div class="card editable">
<h2>➕ Añadir efectivo</h2>
<select id="personaEfectivo"></select>
<input id="efectivoExtra" type="number" placeholder="Cantidad €">
<button onclick="añadirEfectivo()">Añadir efectivo</button>
</div>

<div class="card editable">
<h2>💳 Añadir gasto</h2>
<select id="sitio">
<option>Flap</option>
<option>Colono</option>
<option>Lydo</option>
</select>
<input id="descripcionGasto" placeholder="Descripción">
<input id="montoGasto" type="number" placeholder="Importe €">
<div id="checkboxPersonas"></div>
<button onclick="agregarGasto()">Añadir gasto</button>
</div>

<div class="card"><h2>📊 Resumen Personas</h2><div id="resumenPersonas"></div></div>
<div class="card"><h2>👤 Quién debe y cuánto</h2><div id="quienDebe"></div></div>
<div class="card"><h2>📊 Aportado vs Gastado</h2><canvas id="graficoPersonas"></canvas></div>
<div class="card"><h2>📊 Gasto por sitio</h2><canvas id="graficoSitios"></canvas></div>

<div class="card">
<button onclick="generarPDF()">📄 Descargar PDF</button>
</div>

<script>
const params=new URLSearchParams(location.search)
const soloLectura=params.has("readonly")

let personas=[]
let gastos=[]
let chartPersonas, chartSitios

async function cargarDesdeFirebase(){
  if(!window.docRef) return
  const snap = await getDoc(window.docRef)
  if(snap.exists()){
    personas = snap.data().personas || []
    gastos = snap.data().gastos || []
  }
}

async function guardar(){
  if(soloLectura || !window.docRef) return
  await setDoc(window.docRef,{ personas, gastos })
}

function agregarPersona(){
  personas.push({id:Date.now(),nombre:nombrePersona.value,aportado:+aportePersona.value})
  nombrePersona.value=aportePersona.value=""
  guardar();render()
}

function añadirEfectivo(){
  const p=personas.find(p=>p.id==personaEfectivo.value)
  p.aportado+=+efectivoExtra.value
  efectivoExtra.value=""
  guardar();render()
}

function agregarGasto(){
  const part=[...checkboxPersonas.querySelectorAll("input:checked")].map(c=>+c.value)
  gastos.push({id:Date.now(),sitio:sitio.value,descripcion:descripcionGasto.value,monto:+montoGasto.value,participantes:part})
  descripcionGasto.value=montoGasto.value=""
  guardar();render()
}

function compartirConDatos(){
  const url=location.origin+location.pathname+"?readonly"
  navigator.share?navigator.share({title:"Gastos del grupo",url}):navigator.clipboard.writeText(url)
}

function generarPDF(){
  const {jsPDF}=window.jspdf
  const pdf=new jsPDF()
  pdf.setFontSize(18)
  pdf.text("Gastos del grupo",10,15)
  let y=30
  personas.forEach(p=>{
    const gasto=gastos.reduce((s,g)=>g.participantes.includes(p.id)?s+g.monto/g.participantes.length:s,0)
    const bal=p.aportado-gasto
    pdf.text(`${p.nombre} | Balance: ${bal.toFixed(2)} €`,10,y)
    y+=6
  })
  pdf.save("gastos_grupo.pdf")
}

function render(){
  checkboxPersonas.innerHTML=personaEfectivo.innerHTML=""
  personas.forEach(p=>{
    checkboxPersonas.innerHTML+=`<label><input type="checkbox" value="${p.id}"> ${p.nombre}</label><br>`
    personaEfectivo.innerHTML+=`<option value="${p.id}">${p.nombre}</option>`
  })

  const gastoPersona={}
  personas.forEach(p=>gastoPersona[p.id]=0)
  gastos.forEach(g=>g.participantes.forEach(id=>gastoPersona[id]+=g.monto/g.participantes.length))

  resumenPersonas.innerHTML=personas.map(p=>{
    const bal=p.aportado-gastoPersona[p.id]
    return `${p.nombre}: ${bal.toFixed(2)} €`
  }).join("<br>")

  quienDebe.innerHTML=personas.map(p=>{
    const bal=p.aportado-gastoPersona[p.id]
    return bal<0?`🔴 ${p.nombre} debe ${Math.abs(bal).toFixed(2)} €`:
           bal>0?`🟢 ${p.nombre} recibe ${bal.toFixed(2)} €`:
           `⚪ ${p.nombre} equilibrado`
  }).join("<br>")

  if(chartPersonas) chartPersonas.destroy()
  chartPersonas=new Chart(graficoPersonas,{
    type:"bar",
    data:{
      labels:personas.map(p=>p.nombre),
      datasets:[
        {label:"Aportado",data:personas.map(p=>p.aportado)},
        {label:"Gastado",data:personas.map(p=>gastoPersona[p.id])}
      ]
    }
  })
}

firebaseInit()
</script>

</body>
</html>
